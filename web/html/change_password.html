<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krish RBAC - Change Password</title>
    <link rel="icon" href="/usgromana/assets/icon.ico" type="image/x-icon">
    <link rel="stylesheet" type="text/css" href="/usgromana/css/styles.css">
</head>
<body>
    <div class="container">
        <img class="logo"
            src="/usgromana/assets/dark_logo_transparent.png"
            alt="Krish RBAC">
        <h1 class="title">Change Password</h1>
        <p style="text-align:center;opacity:.8;margin-bottom:1rem;">
            Your admin reset your password. Set a new password to continue.
        </p>
        <form id="change-form" onsubmit="changePassword(event)">
            <div class="form-field">
                <label for="current_password">Current password:</label>
                <input type="password" id="current_password" name="current_password" required>
            </div>
            <div class="form-field">
                <label for="new_password">New password:</label>
                <input type="password" id="new_password" name="new_password" required>
            </div>
            <div class="form-field">
                <label for="confirm_password">Confirm new password:</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>
            <button class="btn" type="submit">Save password</button>
            <div class="form-field" style="margin-top:1rem;">
                <a href="/logout">Logout</a>
            </div>
        </form>
    </div>
    <div class="toast-container" id="toasts"></div>
    <script>
    function addToast(message, type) {
      const toasts = document.getElementById("toasts");
      const toast = document.createElement("div");
      toast.classList.add("toast", "hide", type);
      toast.textContent = message;
      toasts.appendChild(toast);
      setTimeout(() => toast.classList.replace("hide", "show"), 100);
      setTimeout(() => toast.classList.replace("show", "hide"), 4000);
      setTimeout(() => toast.remove(), 5000);
    }
    async function changePassword(event) {
      event.preventDefault();
      const cur = document.getElementById("current_password").value;
      const nw = document.getElementById("new_password").value;
      const conf = document.getElementById("confirm_password").value;
      if (nw !== conf) {
        addToast("New passwords do not match", "error");
        return;
      }
      try {
        const res = await fetch("/usgromana/api/change-password", {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ current_password: cur, new_password: nw }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          addToast(data.error || "Failed", "error");
          return;
        }
        addToast("Password updated. Redirecting…", "success");
        setTimeout(() => { window.location.href = "/"; }, 800);
      } catch (e) {
        addToast(String(e.message || e), "error");
      }
    }
    </script>
</body>
</html>
